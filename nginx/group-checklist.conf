# /etc/nginx/sites-available/group-checklist
# Replace YOUR_DOMAIN with your actual domain or EC2 public IP.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP → HTTPS once you have a cert (certbot does this automatically)
    # For IP-only access, remove this block and keep only the server block below.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
