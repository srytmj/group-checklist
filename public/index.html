<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Checklist</title>
  <link rel="stylesheet" href="/css/vars.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/items.css" />
  <link rel="stylesheet" href="/css/forms.css" />
  <link rel="stylesheet" href="/css/panels.css" />
  <link rel="stylesheet" href="/css/mobile.css" />
</head>
<body x-data="app" x-init="init()" x-cloak>

  <div class="loading-screen" x-show="loading">Loading...</div>

  <!-- Auth page -->
  <div class="auth-page" x-show="!loading && !user && !activeProject">
    <div class="auth-card">
      <h2 x-text="authMode === 'login' ? 'Sign in' : 'Create account'"></h2>
      <p class="auth-sub">Group Checklist</p>
      <div class="form-group">
        <label>Username</label>
        <input type="text" x-model="authForm.username" @keyup.enter="submitAuth()" placeholder="username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" x-model="authForm.password" @keyup.enter="submitAuth()" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p class="error-msg" x-show="authError" x-text="authError"></p>
      <button class="btn btn-primary btn-block" style="margin-top:8px" @click="submitAuth()" :disabled="authLoading">
        <span x-text="authLoading ? 'Please wait...' : (authMode === 'login' ? 'Sign in' : 'Create account')"></span>
      </button>
      <p class="auth-switch">
        <span x-show="authMode === 'login'">No account? <a @click="authMode='register'; authError=''">Register</a></span>
        <span x-show="authMode === 'register'">Already have one? <a @click="authMode='login'; authError=''">Sign in</a></span>
      </p>
    </div>
  </div>

  <!-- Main layout -->
  <div class="layout" x-show="!loading && (user || activeProject)">

    <!-- Mobile sidebar overlay — display managed by x-show only, no inline style -->
    <div class="mobile-overlay" x-show="mobileSidebarOpen" @click="mobileSidebarOpen = false"></div>

    <!-- Sidebar -->
    <aside class="sidebar" :class="{ collapsed: !sidebarOpen, 'mobile-open': mobileSidebarOpen }">
      <!-- Mobile sidebar header -->
      <div class="mobile-sidebar-header" x-show="mobileSidebarOpen" style="display:flex;align-items:center;padding:12px 12px 8px;gap:8px;border-bottom:0.5px solid var(--border);flex-shrink:0;">
        <div class="sidebar-brand" style="flex:1;">Group Checklist</div>
        <button class="btn-link" @click="toggleTheme()" :title="isDark ? 'Switch to light' : 'Switch to dark'" style="font-size:15px;">
          <span x-text="isDark ? '☀' : '🌙'"></span>
        </button>
        <button class="btn-link" @click="mobileSidebarOpen = false" style="font-size:18px;padding:2px 4px;">✕</button>
      </div>
      <div class="sidebar-toggle-row">
        <button class="btn-link" @click="sidebarOpen = !sidebarOpen" :title="sidebarOpen ? 'Collapse' : 'Expand'" style="font-size:17px;flex-shrink:0;padding:0 2px;">
          <span x-text="sidebarOpen ? '‹' : '›'"></span>
        </button>
        <div class="sidebar-brand" x-show="sidebarOpen">Group Checklist</div>
        <button class="btn-link" @click="toggleTheme()" x-show="sidebarOpen" :title="isDark ? 'Switch to light' : 'Switch to dark'" style="font-size:15px;line-height:1;padding:3px;margin-left:auto;">
          <span x-text="isDark ? '☀' : '🌙'"></span>
        </button>
      </div>
      <div class="sidebar-inner" x-show="sidebarOpen || mobileSidebarOpen" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

      <div style="padding: 8px 6px 4px;">
        <button class="btn-new-project" @click="openModal('createProject')" x-show="user">
          + New project
        </button>
      </div>

      <div class="sidebar-projects">
        <template x-if="user">
          <div>
            <template x-for="p in projects" :key="p.id">
              <div class="project-item" :class="{active: activeProject?.slug === p.slug}" @click="selectProject(p.slug)">
                <span class="project-item-name" x-text="p.name"></span>
                <span class="badge-vis" :class="p.visibility === 'public' ? 'badge-public' : 'badge-private'" x-text="p.visibility === 'public' ? 'pub' : 'priv'"></span>
              </div>
            </template>
            <div style="padding: 12px 10px; color: var(--text-muted); font-size: 12px;" x-show="projects.length === 0">
              No projects yet.
            </div>
          </div>
        </template>
        <template x-if="!user && activeProject">
          <div style="padding: 10px; color: var(--text-muted); font-size: 12px; line-height: 1.6;">
            Viewing shared project.<br>
            <a href="#" style="color: var(--accent);" @click.prevent="authMode='login'; openModal('auth')">Sign in</a> to manage your own.
          </div>
        </template>
      </div>

      <div class="sidebar-footer">
        <template x-if="user">
          <div class="user-info">
            <div class="user-avatar" x-text="user.username[0].toUpperCase()"></div>
            <span class="user-name" x-text="user.username"></span>
            <button class="btn-link" title="Sign out" @click="logout()">↪</button>
          </div>
        </template>
        <template x-if="!user">
          <div style="font-size:12px; color: var(--text-muted);">
            Guest: <span x-text="guestName || 'not set'"></span>
            <button class="btn-link" style="margin-left:4px;" @click="openModal('guestName')">change</button>
          </div>
        </template>
      </div>
      </div><!-- /sidebarOpen -->
    </aside>

    <!-- Main -->
    <div class="main">

      <div class="empty-state" x-show="!activeProject">
        <p x-show="user">Select a project or create one.</p>
        <p x-show="!user">Open a shared project link to get started.</p>
      </div>

      <template x-if="activeProject">
        <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">

          <!-- Click-outside backdrop for project menu -->
          <div x-show="showProjectMenu" @click="showProjectMenu = false"
               style="position:fixed;inset:0;z-index:49;" aria-hidden="true"></div>

          <!-- Project settings dropdown (shared between mobile/desktop) -->
          <div x-show="showProjectMenu" class="project-menu-dropdown">
            <button class="project-menu-item" @click="showProjectMenu = false; openModal('export')"><span>📤</span> Export</button>
            <button class="project-menu-item" @click="showProjectMenu = false; copyLink()"><span>🔗</span> Copy link</button>
            <button class="project-menu-item" @click="showProjectMenu = false; toggleViewMode()">
              <span x-text="viewMode === 'tree' ? '≡' : '🌲'"></span>
              <span x-text="viewMode === 'tree' ? 'Flat view' : 'Tree view'"></span>
            </button>
            <button x-show="activeProject.is_owner" class="project-menu-item" @click="showProjectMenu = false; toggleVisibility()">
              <span x-text="activeProject.visibility === 'public' ? '🔒' : '🌐'"></span>
              <span x-text="activeProject.visibility === 'public' ? 'Make private' : 'Make public'"></span>
            </button>
            <button x-show="activeProject.is_owner" class="project-menu-item" :class="{ active: deleteMode }" @click="showProjectMenu = false; toggleDeleteMode()">
              <span>☑</span>
              <span x-text="deleteMode ? 'Cancel select' : 'Select items'"></span>
            </button>
            <div x-show="activeProject.is_owner" class="project-menu-divider"></div>
            <button x-show="activeProject.is_owner" class="project-menu-item danger" @click="showProjectMenu = false; openDeleteProjectModal()">
              <span>🗑</span> Delete project
            </button>
          </div>

          <!-- Mobile top bar -->
          <div class="mobile-topbar">
            <button class="mobile-hamburger" @click="mobileSidebarOpen = true">☰</button>
            <span class="mobile-topbar-title" x-text="activeProject.name"></span>
            <div class="mobile-panel-tabs">
              <button class="mobile-panel-tab" :class="{ active: mobilePanel === 'items' }" @click="mobilePanel = 'items'">Items</button>
              <button class="mobile-panel-tab" :class="{ active: mobilePanel === 'chat' }" @click="mobilePanel = 'chat'">Chat</button>
            </div>
            <button class="btn-link" :class="{ 'pmenu-active': showProjectMenu || deleteMode }"
                    @click="showProjectMenu = !showProjectMenu" title="Project settings"
                    style="font-size:17px;padding:2px 8px;border-radius:6px;">⚙</button>
          </div>

          <!-- Header -->
          <div class="main-header">
            <div class="main-header-top">
              <h1 class="main-title" x-text="activeProject.name"></h1>
              <div class="header-actions">
                <span class="header-visibility-badge">
                  <span x-text="activeProject.visibility === 'public' ? '🌐 Public' : '🔒 Private'"></span>
                </span>
                <button class="header-btn" :class="{ active: showProjectMenu || deleteMode }" @click="showProjectMenu = !showProjectMenu">
                  ⚙ Project ▾
                </button>
              </div>
            </div>
            <p class="progress-label" x-text="items.filter(i=>i.completion).length + ' of ' + items.filter(i=>i.item_type!=='section').length + ' done'"></p>
            <div class="progress-bar-wrap">
              <div class="progress-bar" :style="'width:' + (items.filter(i=>i.item_type!=='section').length ? Math.round(items.filter(i=>i.completion).length / items.filter(i=>i.item_type!=='section').length * 100) : 0) + '%'"></div>
            </div>
          </div>

          <!-- Body: items + right panel -->
          <div class="content-panels" :class="{ 'show-chat': mobilePanel === 'chat' }" style="flex:1;display:flex;overflow:hidden;">
          <div class="main-content" style="flex:1;">
            <div class="items-wrap">

              <template x-for="(item, index) in items" :key="item.id">
                <div
                  x-show="item.item_type === 'section' || viewMode === 'flat' || !sectionMap[item.id] || !collapsedSections[sectionMap[item.id]]"
                  :class="{
                    'item': item.item_type !== 'section',
                    'section-item': item.item_type === 'section',
                    'done': item.item_type !== 'section' && !!item.completion,
                    'tree-child': viewMode === 'tree' && item.item_type !== 'section' && !!sectionMap[item.id],
                    'dragging': activeProject.is_owner && !deleteMode && draggingIndex === index,
                    'drag-over': activeProject.is_owner && !deleteMode && dragOverIndex === index && draggingIndex !== index
                  }"
                  :draggable="activeProject.is_owner && !deleteMode"
                  @dragstart="activeProject.is_owner && !deleteMode && dragStart($event, index)"
                  @dragover.prevent="activeProject.is_owner && !deleteMode && dragOver($event, index)"
                  @drop.prevent="activeProject.is_owner && !deleteMode && drop($event, index)"
                  @dragend="dragEnd()"
                >
                  <!-- Section header -->
                  <template x-if="item.item_type === 'section'">
                    <div class="section-inner">
                      <input x-show="deleteMode" type="checkbox" class="delete-checkbox"
                             :checked="!!selectedItems[item.id]" @change="toggleSelectItem(item)" @click.stop />
                      <button x-show="viewMode === 'tree' && !deleteMode" class="section-collapse-btn"
                              @click.stop="toggleSection(item.id)" :title="collapsedSections[item.id] ? 'Expand section' : 'Collapse section'">
                        <span x-text="collapsedSections[item.id] ? '▶' : '▼'"></span>
                      </button>
                      <span class="drag-handle" x-show="activeProject.is_owner && !deleteMode" title="Drag to reorder">⣿</span>
                      <div class="section-body">
                        <div class="section-title" x-text="item.title"></div>
                        <div class="section-caption" x-show="item.description" x-text="item.description"></div>
                        <div x-show="viewMode === 'tree'" class="section-progress-line">
                          <span class="section-progress-text"
                                x-text="getSectionProgress(item.id).done + '/' + getSectionProgress(item.id).total + ' done'"></span>
                          <div class="section-progress-bar-wrap">
                            <div class="section-progress-bar"
                                 :style="{ width: getSectionProgress(item.id).pct + '%' }"></div>
                          </div>
                        </div>
                      </div>
                      <div class="section-actions" x-show="activeProject.is_owner && !deleteMode">
                        <button class="btn-icon" @click.stop="openEditItemModal(item)" title="Edit">✏</button>
                        <button class="btn-icon danger" @click.stop="openDeleteItemModal(item)" title="Delete">✕</button>
                      </div>
                    </div>
                  </template>

                  <!-- Task item -->
                  <template x-if="!item.item_type || item.item_type === 'task'">
                    <div>
                      <div class="item-main">
                        <input x-show="deleteMode" type="checkbox" class="delete-checkbox"
                               :checked="!!selectedItems[item.id]" @change="toggleSelectItem(item)" @click.stop />
                        <span class="drag-handle" x-show="activeProject.is_owner && !deleteMode" title="Drag to reorder">⣿</span>

                        <div
                          class="checkbox"
                          x-show="!deleteMode"
                          @click="item.completion ? openUncompleteModal(item) : (activeProject.is_owner ? openCompleteModal(item) : handleNonOwnerCheck(item))"
                          :title="item.completion ? 'Undo completion' : 'Mark as complete'"
                        >
                          <span class="checkmark" x-show="item.completion">✓</span>
                        </div>

                        <div class="item-body">
                          <div class="item-text" x-text="item.title"></div>
                          <div x-show="item.description" class="item-desc-wrap">
                            <div class="item-desc" x-text="item.description"></div>
                            <button class="copy-desc-btn" @click.stop="copyDescription(item.description)" title="Copy description">⎘</button>
                          </div>
                        </div>

                        <div class="item-actions" x-show="activeProject.is_owner && !deleteMode">
                          <button class="btn-icon" @click.stop="openEditItemModal(item)" title="Edit">✏</button>
                          <button class="btn-icon danger" @click.stop="openDeleteItemModal(item)" title="Delete">✕</button>
                        </div>
                      </div>

                      <div class="item-footer" x-show="!deleteMode">
                        <div class="footer-field">
                          <span class="footer-label">PIC:</span>
                          <template x-for="pic in item.pics" :key="pic.id">
                            <span class="pic-chip">
                              <span x-text="pic.name"></span>
                              <button x-show="activeProject.is_owner" @click.stop="removePic(item, pic)" title="Remove">×</button>
                            </span>
                          </template>
                          <button class="assign-btn" @click.stop="activeProject.is_owner ? openAddPicModal(item) : openNonOwnerPic(item)">
                            <span x-text="activeProject.is_owner ? '+ add' : 'assign'"></span>
                          </button>
                        </div>
                        <div class="footer-field">
                          <span class="footer-label">Done by:</span>
                          <template x-if="item.completion">
                            <span class="done-name" x-text="item.completion.done_by_name"></span>
                          </template>
                          <template x-if="item.completion">
                            <span class="done-time" x-text="new Date(item.completion.completed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' · ' + new Date(item.completion.completed_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})"></span>
                          </template>
                          <template x-if="!item.completion">
                            <span class="done-empty">-</span>
                          </template>
                        </div>
                        <button class="comment-icon-btn" @click.stop="openCommentPopup(item, $event)" title="Comments">💬</button>
                      </div>
                    </div>
                  </template>

                </div>
              </template>

              <!-- Delete mode floating bar -->
              <div x-show="deleteMode" class="delete-bar">
                <span x-text="selectedCount() + ' item' + (selectedCount() !== 1 ? 's' : '') + ' selected'"></span>
                <div style="display:flex;gap:6px;">
                  <button class="btn btn-secondary" style="padding:5px 12px;" @click="toggleDeleteMode()">Cancel</button>
                  <button class="btn btn-primary" style="padding:5px 12px;background:var(--danger);border-color:var(--danger);"
                          @click="openModal('batchDelete')" :disabled="selectedCount() === 0">
                    Delete
                  </button>
                </div>
              </div>

              <template x-if="activeProject.is_owner && !deleteMode">
                <div class="items-toolbar">
                  <button class="btn-add-item" @click="openModal('addItem')">+ Add task or section</button>
                  <button class="btn-import" @click="openModal('import')" title="Bulk import from CSV">⬆ Import</button>
                </div>
              </template>

            </div>
          </div>

          <!-- Right panel: chat + log -->
          <div class="right-panel">
            <div class="rp-header">
              <div class="rp-tabs">
                <button class="rp-tab" :class="{ active: rightTab === 'chat' }" @click="rightTab = 'chat'">Chat</button>
                <template x-if="activeProject.is_owner">
                  <button class="rp-tab" :class="{ active: rightTab === 'log' }" @click="rightTab = 'log'; loadLogs()">Log</button>
                </template>
              </div>
            </div>
            <!-- Chat tab -->
            <template x-if="rightTab === 'chat'">
              <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
                <div id="chat-messages" style="flex:1;overflow-y:auto;">
                  <div class="chat-list">
                    <div class="rp-empty" x-show="messagesLoading">Loading…</div>
                    <div class="rp-empty" x-show="!messagesLoading && messages.length === 0">No messages yet. Say hi!</div>
                    <template x-for="msg in messages" :key="msg.id">
                      <div>
                        <div class="chat-msg-meta">
                          <span class="chat-sender" x-text="msg.sender_name"></span>
                          <span class="chat-ts" x-text="new Date(msg.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' · ' + new Date(msg.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})"></span>
                        </div>
                        <div class="chat-body" x-text="msg.body"></div>
                      </div>
                    </template>
                  </div>
                </div>
                <template x-if="!user">
                  <div style="padding:8px 12px 10px;font-size:12px;color:var(--text-muted);text-align:center;border-top:0.5px solid var(--border);">
                    <a @click.prevent="authMode='login'; openModal('auth')" style="color:var(--accent);cursor:pointer;">Sign in</a> to send messages.
                  </div>
                </template>
                <template x-if="user">
                  <div class="chat-input-wrap">
                    <input class="chat-input" type="text" x-model="messageInput" @keyup.enter="sendMessage()" placeholder="Message…" />
                    <button class="chat-send" @click="sendMessage()" :disabled="!messageInput.trim()">↑</button>
                  </div>
                </template>
              </div>
            </template>
            <!-- Log tab (owner only) -->
            <template x-if="rightTab === 'log' && activeProject.is_owner">
              <div style="flex:1;overflow-y:auto;">
                <div class="rp-empty" x-show="logsLoading">Loading…</div>
                <div class="rp-empty" x-show="!logsLoading && logsData.length === 0">No activity yet.</div>
                <template x-for="entry in logsData" :key="entry.id">
                  <div class="log-entry">
                    <div><span class="log-actor" x-text="entry.actor_name"></span><span class="log-desc" x-text="' ' + formatLogAction(entry.action)"></span></div>
                    <div class="log-ts" x-text="new Date(entry.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' · ' + new Date(entry.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})"></div>
                  </div>
                </template>
              </div>
            </template>
          </div>
          </div><!-- /body flex -->

        </div>
      </template>

    </div>
  </div>

  <!-- Modals, popups & toast — HTML injected from js/modals.js at alpine:init -->
  <div id="modals-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/modals.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/projects.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/items.js"></script>
  <script src="/js/ws.js"></script>
  <script src="/js/export.js"></script>
  <script src="/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
</body>
</html>
