# /etc/nginx/sites-available/group-checklist

# Redirect bare HTTP → HTTPS (Cloudflare handles public HTTPS; this covers direct EC2 access)
server {
    listen 80;
    server_name cheky.suryatmaja.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cheky.suryatmaja.dev;

    # Cloudflare Origin Certificate (install via: docs/deploy-ec2.md step 3)
    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
